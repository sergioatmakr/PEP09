{% extends 'base.html' %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 p-4">
            <h2 class="fw-bold text-dark text-center mb-4">Iniciar Sesión</h2>
            
            {% if form.errors %}
                <div class="alert alert-danger text-center">Usuario o contraseña incorrectos.</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
                        <div class="form-control-container">
                            <script>
                                document.currentScript.parentElement.innerHTML = `{% filter escapejs %}{{ field }}{% endfilter %}`.replace('name=', 'class="form-control" name=');
                            </script>
                        </div>
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-success w-100 mt-3 py-2">Ingresar al Recetario</button>
            </form>
            <div class="text-center mt-3">
                <p class="text-muted small">¿No tienes cuenta? <a href="{% url 'recetas:signup' %}" class="text-success fw-bold">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
